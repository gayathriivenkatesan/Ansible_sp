---
# ============================================================
# Fetch SilverPeak alarms with exception handling
# - Checks active CRITICAL alarms first
# - If none found, fetches WARNING alarms and filters IPSLA
# - All times are UTC epoch in milliseconds
# ============================================================

- name: Fetch SilverPeak alarms safely
  block:

    # --------------------------------------------------------
    # Time calculations (UTC epoch in milliseconds)
    # --------------------------------------------------------
    - name: Get current UTC epoch time (ms)
      ansible.builtin.command: date -u +%s%3N
      register: utc_now_epoch
      changed_when: false

    - name: Get UTC epoch time 10 minutes ago (ms)
      ansible.builtin.command: date -u -d "10 minutes ago" +%s%3N
      register: utc_minus_10_epoch
      changed_when: false

    - name: Set UTC time facts
      ansible.builtin.set_fact:
        utc_now_ms: "{{ utc_now_epoch.stdout | int }}"
        utc_last_10_ms: "{{ utc_minus_10_epoch.stdout | int }}"

    - name: Show UTC time window
      ansible.builtin.debug:
        msg:
          - "UTC now (ms): {{ utc_now_ms }}"
          - "UTC last 10 min (ms): {{ utc_last_10_ms }}"

    # --------------------------------------------------------
    # Fetch ACTIVE CRITICAL alarms
    # --------------------------------------------------------
    - name: Fetch active CRITICAL alarms
      ansible.builtin.uri:
        validate_certs: false
        url: "{{ sp_appliance_base }}/alarm/appliance?view=active&severity=critical"
        method: POST
        body_format: json
        body:
          nePks:
            - "{{ ne_pk }}"
          # startTime: "{{ utc_last_10_ms }}"
          # endTime: "{{ utc_now_ms }}"
        headers:
          Cookie: "{{ login_resp.set_cookie }}"
          X-XSRF-TOKEN: "{{ login_resp.cookies.orchCsrfToken }}"
          Content-Type: application/json
        return_content: true
      register: critical_alarm_resp
      failed_when: critical_alarm_resp.status not in [200, 201]

    - name: Count CRITICAL alarms
      ansible.builtin.set_fact:
        critical_alarm_count: >-
          {{ critical_alarm_resp.json | default([]) | length }}

    - name: Show CRITICAL alarm count
      ansible.builtin.debug:
        msg: "Total active CRITICAL alarms: {{ critical_alarm_count }}"

    # --------------------------------------------------------
    # Fetch WARNING alarms only if no CRITICAL alarms exist
    # --------------------------------------------------------
    - name: Fetch WARNING alarms when no CRITICAL alarms exist
      block:

        - name: Fetch active WARNING alarms
          ansible.builtin.uri:
            validate_certs: false
            url: "{{ sp_appliance_base }}/alarm/appliance?view=active&severity=warning"
            method: POST
            body_format: json
            body:
              nePks:
                - "{{ ne_pk }}"
            headers:
              Cookie: "{{ login_resp.set_cookie }}"
              X-XSRF-TOKEN: "{{ login_resp.cookies.orchCsrfToken }}"
              Content-Type: application/json
            return_content: true
          register: warning_alarm_resp
          failed_when: warning_alarm_resp.status not in [200, 201]

        - name: Filter IPSLA WARNING alarms
          ansible.builtin.set_fact:
            ipsla_alarms: >-
              {{
                warning_alarm_resp.json
                | default([])
                | selectattr('source', 'equalto', 'IPSLA')
                | list
              }}

        - name: Count IPSLA WARNING alarms
          ansible.builtin.set_fact:
            warning_alarm_count: "{{ ipsla_alarms | length }}"

        - name: Show IPSLA WARNING alarm count
          ansible.builtin.debug:
            msg: "Total active IPSLA WARNING alarms: {{ warning_alarm_count }}"

      when: critical_alarm_count | int == 0

  rescue:
    # --------------------------------------------------------
    # Exception handling
    # --------------------------------------------------------
    - name: Alarm API failure
      ansible.builtin.debug:
        msg:
          - "ERROR: Failed to fetch alarms from SilverPeak"
          - "Endpoint: {{ sp_appliance_base }}"
          - "NE PK: {{ ne_pk }}"
          - "Details: {{ ansible_failed_result | default('N/A') }}"

    - name: Mark alarm fetch as failed
      ansible.builtin.fail:
        msg: "SilverPeak alarm fetch failed. Check API availability or credentials."

  always:
    # --------------------------------------------------------
    # Always executed
    # --------------------------------------------------------
    - name: Alarm check completed
      ansible.builtin.debug:
        msg: "SilverPeak alarm check task finished."
